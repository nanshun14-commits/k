<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リビールブラシ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #111; color: #eee; padding: 1.5rem; }
h1 { font-size: 18px; font-weight: 500; margin-bottom: 1rem; }
#file-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 1rem; }
.ctrl-group { display: flex; align-items: center; gap: 8px; }
label { font-size: 13px; color: #aaa; }
input[type=file] { font-size: 13px; color: #eee; }
.controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 0.75rem; }
input[type=range] { width: 80px; }
button { font-size: 13px; padding: 5px 12px; background: transparent; border: 0.5px solid #555; color: #eee; border-radius: 8px; cursor: pointer; }
button:hover { background: #2a2a2a; }
button.active { background: #444; border-color: #aaa; }
button.on { background: #2a3a5a; border-color: #5af; color: #adf; }
#canvas-wrap { position: relative; display: inline-block; border-radius: 12px; overflow: hidden; border: 0.5px solid #444; user-select: none; touch-action: none; }
canvas { display: block; }
#slider-line-v { display:none; position:absolute; top:0; width:2px; height:100%; background:#fff; opacity:0; pointer-events:none; }
#slider-line-h { display:none; position:absolute; left:0; width:100%; height:2px; background:#fff; opacity:0; pointer-events:none; }
#hint { font-size: 13px; color: #666; margin-top: 0.75rem; }
#progress { font-size: 13px; color: #aaa; margin-top: 0.4rem; }
.sep { color: #333; font-size: 18px; }
.sl { font-size: 12px; color: #666; margin-right: 2px; }
</style>
</head>
<body>
<h1>リビールブラシ</h1>
<div id="file-row">
  <div class="ctrl-group">
    <label>元画像</label>
    <input type="file" id="base-file" accept="image/*">
  </div>
  <div class="ctrl-group">
    <label>生成後画像</label>
    <input type="file" id="reveal-file" accept="image/*">
  </div>
</div>

<div class="controls">
  <span class="sl">モード</span>
  <button id="mode-brush" class="active">ブラシ</button>
  <button id="mode-ghost">うっすら</button>
  <button id="mode-left">← 左</button>
  <button id="mode-right">右 →</button>
  <button id="mode-top">↑ 上</button>
  <button id="mode-bottom">↓ 下</button>
  <button id="mode-jelly">プルプル</button>
</div>

<div class="controls">
  <span class="sl">ブラシ</span>
  <input type="range" id="brush-size" min="10" max="120" value="40" step="1">
  <span id="brush-out" style="font-size:13px;min-width:24px;">40</span>
  <span class="sep" id="ghost-sep" style="display:none;">|</span>
  <span class="sl" id="ghost-label" style="display:none;">透過度</span>
  <input type="range" id="ghost-alpha" min="5" max="60" value="25" step="1" style="display:none;width:80px;">
  <span id="ghost-out" style="font-size:13px;min-width:24px;display:none;">25</span>
  <span class="sep" id="jelly-sep" style="display:none;">|</span>
  <span class="sl" id="jelly-label" style="display:none;">やわらかさ</span>
  <input type="range" id="jelly-soft" min="1" max="10" value="5" step="1" style="display:none;width:80px;">
  <span id="jelly-out" style="font-size:13px;min-width:24px;display:none;">5</span>
  <span class="sep" id="jelly-sep2" style="display:none;">|</span>
  <span class="sl" id="jelly-size-label" style="display:none;">範囲</span>
  <input type="range" id="jelly-radius" min="20" max="300" value="100" step="5" style="display:none;width:80px;">
  <span id="jelly-radius-out" style="font-size:13px;min-width:24px;display:none;">100</span>
  <span class="sep" id="jelly-sep3" style="display:none;">|</span>
  <button id="jelly-loop-btn" style="display:none;">∞ ずっとプルプル</button>
  <span class="sep">|</span>
  <button id="reset-btn">リセット</button>
  <button id="random-btn">ランダム展開</button>
  <button id="flicker-btn">フリッカー</button>
</div>

<div id="canvas-wrap">
  <canvas id="main-canvas"></canvas>
  <canvas id="hit-canvas" style="position:absolute;top:0;left:0;opacity:0;"></canvas>
  <div id="slider-line-v"></div>
  <div id="slider-line-h"></div>
</div>
<div id="progress">リビール: 0%</div>
<p id="hint">元画像と生成後画像を選んでからなぞってください。</p>

<script>
const mainCanvas = document.getElementById('main-canvas');
const hitCanvas  = document.getElementById('hit-canvas');
const ctx = mainCanvas.getContext('2d');
const sliderV = document.getElementById('slider-line-v');
const sliderH = document.getElementById('slider-line-h');
const progressEl = document.getElementById('progress');
const hint = document.getElementById('hint');

let W=480, H=640;
let baseImg=null, revealImg=null;
let drawing=false;
let brushSize=40;
let maskData=null;
let basePixels=null, revealPixels=null;
let mode='brush';
let sliderPos=0.5;
let flickerTimer=null, flickerState=false;
let randomTimer=null;
let ghostAlpha=0.25;
let softness=5;
let jellyRadius=100;
let loopMode=false;

// jelly grid (低解像度変位場)
const JRES=6;
let jW, jH;
let dispX, dispY, velX, velY;
let jellyAnim=null;
let dragActive=false;
let dragOriginX=0, dragOriginY=0;
let dragCurX=0, dragCurY=0;

// マルチタッチ用: 複数の指を管理
// { id, originX, originY, curX, curY }
let activeTouches={};

function setSize(w,h){
  W=w; H=h;
  mainCanvas.width=W; mainCanvas.height=H;
  hitCanvas.width=W; hitCanvas.height=H;
  maskData=new Uint8Array(W*H);
  initJelly();
}

function initJelly(){
  jW=Math.ceil(W/JRES)+2;
  jH=Math.ceil(H/JRES)+2;
  dispX=new Float32Array(jW*jH);
  dispY=new Float32Array(jW*jH);
  velX=new Float32Array(jW*jH);
  velY=new Float32Array(jW*jH);
}

function loadImg(file,cb){
  const url=URL.createObjectURL(file);
  const img=new Image();
  img.onload=()=>{cb(img);URL.revokeObjectURL(url);};
  img.src=url;
}

function getPixels(img){
  const off=document.createElement('canvas');
  off.width=W; off.height=H;
  const c=off.getContext('2d');
  c.drawImage(img,0,0,W,H);
  return c.getImageData(0,0,W,H).data;
}

function updateProgress(){
  if(!maskData)return;
  let f=0;
  for(let i=0;i<maskData.length;i++) if(maskData[i]>0) f++;
  progressEl.textContent='リビール: '+Math.round(f/maskData.length*100)+'%';
}

function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

// bilinear sample
function samplePixel(pixels,fx,fy){
  const x0=Math.floor(clamp(fx,0,W-1));
  const y0=Math.floor(clamp(fy,0,H-1));
  const x1=Math.min(x0+1,W-1);
  const y1=Math.min(y0+1,H-1);
  const tx=fx-x0, ty=fy-y0;
  const p00=(y0*W+x0)*4, p10=(y0*W+x1)*4;
  const p01=(y1*W+x0)*4, p11=(y1*W+x1)*4;
  const w00=(1-tx)*(1-ty), w10=tx*(1-ty);
  const w01=(1-tx)*ty,     w11=tx*ty;
  return [
    pixels[p00]*w00+pixels[p10]*w10+pixels[p01]*w01+pixels[p11]*w11,
    pixels[p00+1]*w00+pixels[p10+1]*w10+pixels[p01+1]*w01+pixels[p11+1]*w11,
    pixels[p00+2]*w00+pixels[p10+2]*w10+pixels[p01+2]*w01+pixels[p11+2]*w11
  ];
}

// bilinear interp of jelly grid displacement
function getDisp(px,py){
  const gx=px/JRES, gy=py/JRES;
  const gx0=Math.floor(gx), gy0=Math.floor(gy);
  const gx1=Math.min(gx0+1,jW-1), gy1=Math.min(gy0+1,jH-1);
  const tx=gx-gx0, ty=gy-gy0;
  const i00=gy0*jW+gx0, i10=gy0*jW+gx1;
  const i01=gy1*jW+gx0, i11=gy1*jW+gx1;
  return [
    dispX[i00]*(1-tx)*(1-ty)+dispX[i10]*tx*(1-ty)+dispX[i01]*(1-tx)*ty+dispX[i11]*tx*ty,
    dispY[i00]*(1-tx)*(1-ty)+dispY[i10]*tx*(1-ty)+dispY[i01]*(1-tx)*ty+dispY[i11]*tx*ty
  ];
}

// 単一ドラッグのdisp適用
function applyDragToDisp(){
  applyAllTouchesToDisp();
}

// 全タッチ点をまとめてdispに重ね合わせ（velは触らない）
function applyAllTouchesToDisp(){
  const maxPull=120;
  const gRadius=jellyRadius/JRES;
  const points=Object.values(activeTouches);
  for(let i=0;i<jW*jH;i++){ dispX[i]=0; dispY[i]=0; }
  points.forEach(pt=>{
    const pullX=pt.curX-pt.originX, pullY=pt.curY-pt.originY;
    const len=Math.sqrt(pullX*pullX+pullY*pullY);
    const scale=len>maxPull?maxPull/len:1;
    const px=pullX*scale, py=pullY*scale;
    const gOX=pt.originX/JRES, gOY=pt.originY/JRES;
    for(let jy=0;jy<jH;jy++) for(let jx=0;jx<jW;jx++){
      const dx=jx-gOX, dy=jy-gOY;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const str=dist<gRadius?Math.pow(1-dist/gRadius,2.0):0;
      dispX[jy*jW+jx]+=px*str;
      dispY[jy*jW+jx]+=py*str;
    }
  });
  renderJelly();
}

function updateJellySpring(){
  const stiffness=0.04+(11-softness)*0.008;
  // loopMode: damping=1.0 (減衰なし)、通常: damping<1.0
  const damping=loopMode?1.0:(0.72+softness*0.022);

  let moving=false;
  for(let i=0;i<jW*jH;i++){
    velX[i]=(velX[i]-dispX[i]*stiffness)*damping;
    velY[i]=(velY[i]-dispY[i]*stiffness)*damping;
    dispX[i]+=velX[i];
    dispY[i]+=velY[i];
    if(Math.abs(velX[i])>0.02||Math.abs(velY[i])>0.02) moving=true;
  }
  renderJelly();

  if(loopMode||moving){
    jellyAnim=requestAnimationFrame(updateJellySpring);
  } else {
    jellyAnim=null;
  }
}

function renderJelly(){
  if(!revealPixels){render();return;}
  const imgData=ctx.createImageData(W,H);
  const d=imgData.data;
  for(let y=0;y<H;y++) for(let x=0;x<W;x++){
    const [dx,dy]=getDisp(x,y);
    // 変位を小さめにクランプして極端な歪みを防ぐ
    const sx=clamp(x+dx*0.6,0,W-1);
    const sy=clamp(y+dy*0.6,0,H-1);
    const s=samplePixel(revealPixels,sx,sy);
    const p=(y*W+x)*4;
    d[p]=s[0];d[p+1]=s[1];d[p+2]=s[2];d[p+3]=255;
  }
  ctx.putImageData(imgData,0,0);
}

function render(){
  if(!basePixels)return;
  if(mode==='jelly'){renderJelly();return;}
  const imgData=ctx.createImageData(W,H);
  const d=imgData.data;
  if(mode==='left'||mode==='right'){
    const sx=Math.round(sliderPos*W);
    for(let y=0;y<H;y++) for(let x=0;x<W;x++){
      const i=(y*W+x)*4;
      const ur=revealPixels&&(mode==='right'?x>=sx:x<sx);
      const s=ur?revealPixels:basePixels;
      d[i]=s[i];d[i+1]=s[i+1];d[i+2]=s[i+2];d[i+3]=255;
    }
    sliderV.style.left=Math.round(sliderPos*mainCanvas.getBoundingClientRect().width)+'px';
  } else if(mode==='top'||mode==='bottom'){
    const sy=Math.round(sliderPos*H);
    for(let y=0;y<H;y++) for(let x=0;x<W;x++){
      const i=(y*W+x)*4;
      const ur=revealPixels&&(mode==='bottom'?y>=sy:y<sy);
      const s=ur?revealPixels:basePixels;
      d[i]=s[i];d[i+1]=s[i+1];d[i+2]=s[i+2];d[i+3]=255;
    }
    sliderH.style.top=Math.round(sliderPos*mainCanvas.getBoundingClientRect().height)+'px';
  } else if(flickerState&&revealPixels){
    for(let i=0;i<W*H*4;i+=4){d[i]=revealPixels[i];d[i+1]=revealPixels[i+1];d[i+2]=revealPixels[i+2];d[i+3]=255;}
  } else if(mode==='ghost'){
    for(let i=0;i<W*H;i++){
      const p=i*4,a=Math.max(ghostAlpha,maskData[i]/255);
      if(revealPixels){d[p]=basePixels[p]*(1-a)+revealPixels[p]*a;d[p+1]=basePixels[p+1]*(1-a)+revealPixels[p+1]*a;d[p+2]=basePixels[p+2]*(1-a)+revealPixels[p+2]*a;d[p+3]=255;}
      else{d[p]=basePixels[p];d[p+1]=basePixels[p+1];d[p+2]=basePixels[p+2];d[p+3]=255;}
    }
  } else {
    for(let i=0;i<W*H;i++){
      const p=i*4,alpha=maskData[i]/255;
      if(revealPixels&&alpha>0){d[p]=basePixels[p]*(1-alpha)+revealPixels[p]*alpha;d[p+1]=basePixels[p+1]*(1-alpha)+revealPixels[p+1]*alpha;d[p+2]=basePixels[p+2]*(1-alpha)+revealPixels[p+2]*alpha;d[p+3]=255;}
      else{d[p]=basePixels[p];d[p+1]=basePixels[p+1];d[p+2]=basePixels[p+2];d[p+3]=255;}
    }
  }
  ctx.putImageData(imgData,0,0);
  updateProgress();
}

function paintMask(px,py){
  const r=brushSize;
  const x0=Math.max(0,Math.floor(px-r)),x1=Math.min(W-1,Math.ceil(px+r));
  const y0=Math.max(0,Math.floor(py-r)),y1=Math.min(H-1,Math.ceil(py+r));
  for(let y=y0;y<=y1;y++) for(let x=x0;x<=x1;x++)
    if((x-px)**2+(y-py)**2<=r*r) maskData[y*W+x]=255;
  render();
}

function resetMask(){
  stopFlicker();stopRandom();
  loopMode=false;
  const btn=document.getElementById('jelly-loop-btn');
  btn.classList.remove('on');btn.textContent='∞ ずっとプルプル';
  if(jellyAnim){cancelAnimationFrame(jellyAnim);jellyAnim=null;}
  maskData=new Uint8Array(W*H);
  initJelly();render();
}

function startRandom(){
  if(!basePixels||!revealPixels)return;stopRandom();
  const pts=[];
  for(let i=0;i<8;i++) pts.push({x:Math.random()*W,y:Math.random()*H,r:0});
  randomTimer=setInterval(()=>{
    pts.forEach(pt=>{
      if(pt.r<Math.max(W,H)){pt.r+=10;paintMask(pt.x,pt.y);
        if(pt.r>60&&Math.random()<0.04)pts.push({x:Math.random()*W,y:Math.random()*H,r:0});}
    });
    if(pts.every(p=>p.r>=Math.max(W,H)))stopRandom();
  },30);
}
function stopRandom(){if(randomTimer){clearInterval(randomTimer);randomTimer=null;}}
function startFlicker(){
  if(!basePixels||!revealPixels)return;
  let count=0;
  flickerTimer=setInterval(()=>{flickerState=!flickerState;render();count++;if(count>14)stopFlicker();},110);
}
function stopFlicker(){if(flickerTimer){clearInterval(flickerTimer);flickerTimer=null;}flickerState=false;}

function showJellyControls(show){
  ['jelly-label','jelly-sep','jelly-soft','jelly-out',
   'jelly-sep2','jelly-size-label','jelly-radius','jelly-radius-out',
   'jelly-sep3','jelly-loop-btn'].forEach(id=>{
    document.getElementById(id).style.display=show?'inline-block':'none';
  });
}

function setMode(m){
  mode=m;
  sliderV.style.display=(m==='left'||m==='right')?'block':'none';
  sliderH.style.display=(m==='top'||m==='bottom')?'block':'none';
  const isGhost=m==='ghost',isJelly=m==='jelly';
  ['ghost-label','ghost-sep','ghost-alpha','ghost-out'].forEach(id=>{
    document.getElementById(id).style.display=isGhost?'inline-block':'none';
  });
  showJellyControls(isJelly);
  const isCompare=['left','right','top','bottom'].includes(m);
  hitCanvas.style.cursor=isJelly?'grab':isCompare?(m==='top'||m==='bottom'?'ns-resize':'ew-resize'):'crosshair';
  ['brush','ghost','left','right','top','bottom','jelly'].forEach(id=>{
    const el=document.getElementById('mode-'+id);if(el)el.classList.remove('active');
  });
  document.getElementById('mode-'+m).classList.add('active');
  render();
}

document.getElementById('jelly-loop-btn').addEventListener('click',()=>{
  if(!revealPixels)return;
  loopMode=!loopMode;
  const btn=document.getElementById('jelly-loop-btn');
  if(loopMode){
    btn.classList.add('on');btn.textContent='■ 止める';
    if(!jellyAnim) jellyAnim=requestAnimationFrame(updateJellySpring);
  } else {
    btn.classList.remove('on');btn.textContent='∞ ずっとプルプル';
    // 止めた後は自然に収束
  }
});

document.getElementById('mode-brush').addEventListener('click',()=>setMode('brush'));
document.getElementById('mode-ghost').addEventListener('click',()=>setMode('ghost'));
document.getElementById('mode-left').addEventListener('click',()=>setMode('left'));
document.getElementById('mode-right').addEventListener('click',()=>setMode('right'));
document.getElementById('mode-top').addEventListener('click',()=>setMode('top'));
document.getElementById('mode-bottom').addEventListener('click',()=>setMode('bottom'));
document.getElementById('mode-jelly').addEventListener('click',()=>setMode('jelly'));
document.getElementById('brush-size').addEventListener('input',e=>{brushSize=parseInt(e.target.value);document.getElementById('brush-out').textContent=brushSize;});
document.getElementById('ghost-alpha').addEventListener('input',e=>{ghostAlpha=parseInt(e.target.value)/100;document.getElementById('ghost-out').textContent=e.target.value;render();});
document.getElementById('jelly-soft').addEventListener('input',e=>{softness=parseInt(e.target.value);document.getElementById('jelly-out').textContent=softness;});
document.getElementById('jelly-radius').addEventListener('input',e=>{jellyRadius=parseInt(e.target.value);document.getElementById('jelly-radius-out').textContent=jellyRadius;});
document.getElementById('reset-btn').addEventListener('click',resetMask);
document.getElementById('random-btn').addEventListener('click',startRandom);
document.getElementById('flicker-btn').addEventListener('click',startFlicker);

document.getElementById('base-file').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  loadImg(f,img=>{
    baseImg=img;const ratio=img.height/img.width;
    setSize(480,Math.round(480*ratio));
    basePixels=getPixels(img);
    if(revealImg)revealPixels=getPixels(revealImg);
    resetMask();
    hint.textContent=revealImg?'準備完了！':'生成後画像も選んでください。';
  });
});
document.getElementById('reveal-file').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  loadImg(f,img=>{revealImg=img;if(baseImg){revealPixels=getPixels(img);render();}hint.textContent=baseImg?'準備完了！':'元画像も選んでください。';});
});

function getPos(e){
  const rect=hitCanvas.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  return{x:(cx-rect.left)*W/rect.width,y:(cy-rect.top)*H/rect.height,
         rx:(cx-rect.left)/rect.width,ry:(cy-rect.top)/rect.height};
}

const MOUSE_ID='mouse';

function handleDown(e){
  drawing=true;
  const p=getPos(e);
  if(mode==='jelly'){
    hitCanvas.style.cursor='grabbing';
    if(loopMode){
      // ずっとプルプル中はactiveTouchesに追加
      activeTouches[MOUSE_ID]={originX:p.x,originY:p.y,curX:p.x,curY:p.y};
      applyAllTouchesToDisp();
    } else {
      dragActive=true;
      dragOriginX=p.x;dragOriginY=p.y;
      dragCurX=p.x;dragCurY=p.y;
      if(jellyAnim){cancelAnimationFrame(jellyAnim);jellyAnim=null;}
      applyDragToDisp();
    }
  } else if(['left','right'].includes(mode)){sliderPos=clamp(p.rx,0,1);render();}
  else if(['top','bottom'].includes(mode)){sliderPos=clamp(p.ry,0,1);render();}
  else paintMask(p.x,p.y);
}

function handleMove(e){
  if(!drawing)return;
  const p=getPos(e);
  if(mode==='jelly'){
    if(loopMode){
      if(activeTouches[MOUSE_ID]){
        activeTouches[MOUSE_ID].curX=p.x;
        activeTouches[MOUSE_ID].curY=p.y;
        applyAllTouchesToDisp();
      }
    } else if(dragActive){
      dragCurX=p.x;dragCurY=p.y;
      applyDragToDisp();
    }
  } else if(['left','right'].includes(mode)){sliderPos=clamp(p.rx,0,1);render();}
  else if(['top','bottom'].includes(mode)){sliderPos=clamp(p.ry,0,1);render();}
  else paintMask(p.x,p.y);
}

function releaseJellyPoint(ox,oy,cx,cy){
  const pullX=cx-ox, pullY=cy-oy;
  const maxPull=120;
  const len=Math.sqrt(pullX*pullX+pullY*pullY);
  const scale=len>maxPull?maxPull/len:1;
  const px=pullX*scale*0.25, py=pullY*scale*0.25;
  const gOX=ox/JRES, gOY=oy/JRES;
  const gRadius=jellyRadius/JRES;
  for(let jy=0;jy<jH;jy++) for(let jx=0;jx<jW;jx++){
    const dx=jx-gOX, dy=jy-gOY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const str=dist<gRadius?Math.pow(1-dist/gRadius,2.0):0;
    velX[jy*jW+jx]+=px*str;
    velY[jy*jW+jx]+=py*str;
  }
}

function handleUp(){
  drawing=false;
  if(mode==='jelly'){
    hitCanvas.style.cursor='grab';
    if(loopMode){
      const t=activeTouches[MOUSE_ID];
      if(t){
        releaseJellyPoint(t.originX,t.originY,t.curX,t.curY);
        delete activeTouches[MOUSE_ID];
        // 残りのタッチがあればdispを再適用
        if(Object.keys(activeTouches).length>0) applyAllTouchesToDisp();
        if(!jellyAnim) jellyAnim=requestAnimationFrame(updateJellySpring);
      }
    } else if(dragActive){
      dragActive=false;
      releaseJellyPoint(dragOriginX,dragOriginY,dragCurX,dragCurY);
      if(!jellyAnim) jellyAnim=requestAnimationFrame(updateJellySpring);
    }
  }
}

hitCanvas.addEventListener('mousedown',e=>{handleDown(e);});
hitCanvas.addEventListener('mousemove',e=>{handleMove(e);});
hitCanvas.addEventListener('mouseup',handleUp);
hitCanvas.addEventListener('mouseleave',handleUp);

// マルチタッチ対応
hitCanvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(mode==='jelly'&&loopMode){
    // ずっとプルプル中: 全タッチ点を登録
    Array.from(e.changedTouches).forEach(t=>{
      const rect=hitCanvas.getBoundingClientRect();
      const x=(t.clientX-rect.left)*W/rect.width;
      const y=(t.clientY-rect.top)*H/rect.height;
      activeTouches[t.identifier]={originX:x,originY:y,curX:x,curY:y};
    });
    applyAllTouchesToDisp();
  } else {
    handleDown(e);
  }
},{passive:false});

hitCanvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(mode==='jelly'&&loopMode){
    Array.from(e.changedTouches).forEach(t=>{
      if(activeTouches[t.identifier]){
        const rect=hitCanvas.getBoundingClientRect();
        activeTouches[t.identifier].curX=(t.clientX-rect.left)*W/rect.width;
        activeTouches[t.identifier].curY=(t.clientY-rect.top)*H/rect.height;
      }
    });
    applyAllTouchesToDisp();
  } else {
    handleMove(e);
  }
},{passive:false});

hitCanvas.addEventListener('touchend',e=>{
  if(mode==='jelly'&&loopMode){
    Array.from(e.changedTouches).forEach(t=>{
      const touch=activeTouches[t.identifier];
      if(touch){
        releaseJellyPoint(touch.originX,touch.originY,touch.curX,touch.curY);
        delete activeTouches[t.identifier];
      }
    });
    if(Object.keys(activeTouches).length>0) applyAllTouchesToDisp();
    if(!jellyAnim) jellyAnim=requestAnimationFrame(updateJellySpring);
  } else {
    handleUp();
  }
});

setSize(480,640);
ctx.fillStyle='#1a1a1a';ctx.fillRect(0,0,W,H);
ctx.fillStyle='#555';ctx.font='16px sans-serif';ctx.textAlign='center';
ctx.fillText('元画像を選んでください',W/2,H/2);
</script>
</body>
